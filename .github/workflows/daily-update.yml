name: Daily macro dashboard update

on:
  schedule:
    # 10:30 UTC = 18:30 Asia/Shanghai
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-macro-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install data dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Fetch data and build static dashboard
        run: python src/update_dashboard.py --output public

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/latest.json public
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "data: daily macro update"
            git push
          fi
