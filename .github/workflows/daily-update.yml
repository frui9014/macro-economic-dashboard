name: Update and deploy macro dashboard

on:
  schedule:
    # 10:30 UTC = 18:30 Asia/Shanghai
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install data dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Fetch data and build static dashboard
        run: python src/update_dashboard.py --output public

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily_snapshot.json data/processed/latest.json public
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "data: daily macro update"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
